{% extends 'store/base.html' %}
{% block title %}Delete Book{% endblock %}
{% block content %}
<h1>Delete {{ object }}?</h1>
<p>This action cannot be undone.</p>
<form method="post">
  {% csrf_token %}
  <button type="submit">Yes, delete</button>
  <a href="{% url 'book-list' %}">Cancel</a>
</form>
{% endblock %}
