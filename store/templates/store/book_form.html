{% extends 'store/base.html' %}
{% block title %}
  {% if object %}Edit Book{% else %}Add Book{% endif %}
{% endblock %}
{% block content %}
<h1>{% if object %}Edit {{ object }}{% else %}Add a Book{% endif %}</h1>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Save</button>
  <a href="{% url 'book-list' %}">Cancel</a>
</form>
{% endblock %}
