{% extends 'store/base.html' %}
{% block title %}Stores{% endblock %}
{% block content %}
<h1>Our 4 Stores</h1>
<ul>
  {% for store in stores %}
    <li>
      <a href="{% url 'store-detail' store.pk %}">{{ store }}</a>
      &mdash; Opened: {{ store.opened_date|date:"M d, Y" }}
    </li>
  {% endfor %}
</ul>
{% endblock %}
